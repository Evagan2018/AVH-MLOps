# This workflow tests the licensed Docker image (amd64) generated by the licensed_image_build.yml workflow.
# It pulls the image from GitHub Container Registry and verifies that all expected tools are installed
# and functional inside the container.

name: Test Licensed Docker Image (amd64)

on:
  workflow_run:
    workflows: ["Licensed Docker Image - Build and Push"]
    types:
      - completed
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/test_licensed_docker_image_amd64.yml
      - docker_licensed/**
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Format repo slug
        id: repo_slug
        run: echo "REPO_SLUG=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull Licensed Docker image (amd64)
        run: docker pull ghcr.io/${{ env.REPO_SLUG }}/arm-mlops-docker-licensed:latest-amd64

      - name: Start Docker container
        run: |
          docker run -d --name test_container \
            ghcr.io/${{ env.REPO_SLUG }}/arm-mlops-docker-licensed:latest-amd64 \
            sleep infinity

      - name: Test - Verify vcpkg
        run: docker exec test_container runops vcpkg version

      - name: Test - Verify CMSIS Toolbox (cbuild)
        run: docker exec test_container runops cbuild --version

      - name: Test - Verify CMSIS Toolbox (cpackget)
        run: docker exec test_container runops cpackget --version

      - name: Test - Verify Arm Compiler (armclang)
        run: docker exec test_container runops armclang --version

      - name: Test - Verify GCC for Arm (arm-none-eabi-gcc)
        run: docker exec test_container runops arm-none-eabi-gcc --version

      - name: Test - Verify CMake
        run: docker exec test_container runops cmake --version

      - name: Test - Verify Ninja
        run: docker exec test_container runops ninja --version

      - name: Test - Verify Arm License Manager
        run: docker exec test_container runops /opt/armlm/bin/armlm --version

      - name: Test - Verify Vela compiler
        run: docker exec test_container runops vela --version

      - name: Test - Verify FVP model
        run: docker exec test_container runops FVP_Corstone_SSE-300_Ethos-U55 --version

      - name: Cleanup
        if: always()
        run: docker rm -f test_container
